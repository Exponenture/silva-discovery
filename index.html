<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>SILVA × Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { font-family: 'Poppins', system-ui, sans-serif; background: #FAFAF6; }

      #mobile-block {
        display: none;
        position: fixed; inset: 0; z-index: 9999;
        background: #0F1D35;
        flex-direction: column;
        align-items: center; justify-content: center;
        padding: 40px 32px; text-align: center;
      }
      #mobile-block .icon { font-size: 40px; margin-bottom: 24px; opacity: 0.5; }
      #mobile-block h1 { font-size: 20px; font-weight: 400; color: #fff; margin-bottom: 12px; line-height: 1.3; }
      #mobile-block h1 span { color: #C9973A; }
      #mobile-block p { font-size: 13px; color: #A8B4C0; line-height: 1.7; max-width: 300px; }
      #mobile-block .rule { width: 40px; height: 3px; background: #C9973A; margin: 0 auto 24px; }

      @media (max-width: 768px) { #mobile-block { display: flex; } }
    </style>
  </head>
  <body>
    <div id="mobile-block">
      <div class="rule"></div>
      <div class="icon">⊞</div>
      <h1>Best viewed on a <span>larger screen</span></h1>
      <p>This tool contains interactive financial models that aren't optimised for mobile devices. Please open it on a laptop or desktop for the full experience.</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
